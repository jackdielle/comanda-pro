spring.application.name=comanda-pro
server.port=${PORT:8080}

# PostgreSQL Database Configuration
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (disabled in production)
spring.h2.console.enabled=false

# Logging
logging.level.root=INFO
logging.level.com.saleorigano=INFO

# CORS Configuration
server.servlet.context-path=/api

# JWT Configuration (read from environment variables)
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=${JWT_EXPIRATION:900000}
jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRATION:604800000}
