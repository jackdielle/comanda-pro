spring.application.name=comanda-pro
server.port=8080

# H2 Database Configuration
spring.datasource.url=jdbc:h2:file:./data/gestoredb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (solo per debug)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging
logging.level.root=INFO
logging.level.com.saleorigano=DEBUG

# CORS Configuration
server.servlet.context-path=/api

# JWT Configuration
jwt.secret=ThisIsAVerySecretKeyForJWTAuthenticationMustBe256Bits==
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000
