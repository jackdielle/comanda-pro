spring.application.name=comanda-pro
server.port=8080

# Database Configuration (profile-specific)
# Use application-dev.properties for H2 development
# Use application-prod.properties for PostgreSQL production

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.root=INFO
logging.level.com.saleorigano=DEBUG

# CORS Configuration
server.servlet.context-path=/api

# JWT Configuration (overridden in prod)
jwt.secret=ThisIsAVerySecretKeyForJWTAuthenticationMustBe256Bits==
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000
