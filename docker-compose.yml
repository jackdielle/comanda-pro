version: '3.8'

services:
  # Backend Spring Boot
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gestore-comande-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JAVA_OPTS=-Xmx512m
    volumes:
      - ./data:/app/data
    networks:
      - gestore-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Angular
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gestore-comande-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - gestore-network
    environment:
      - API_URL=http://backend:8080/api

networks:
  gestore-network:
    driver: bridge

volumes:
  gestore-data:
    driver: local
